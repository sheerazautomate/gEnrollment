<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PESRP Markaz Enrollment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root[data-theme="dark"] {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2330; --border: #30363d;
    --accent: #58a6ff; --accent2: #3fb950; --text: #e6edf3; --muted: #7d8590;
  }
  :root[data-theme="light"] {
    --bg: #f6f8fa; --surface: #ffffff; --surface2: #f3f4f6; --border: #d0d7de;
    --accent: #0969da; --accent2: #1a7f37; --text: #1f2328; --muted: #656d76;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; transition: background 0.3s; font-size: 14px; }
  
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo-mark { width: 36px; height: 36px; background: var(--accent2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; }
  .header-date { margin-left: auto; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--accent2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
  
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* FILTERS */
  .filter-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .filter-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
  select { 
    background: var(--surface2); border: 1px solid var(--border); color: var(--text); 
    padding: 10px; border-radius: 6px; cursor: pointer; outline: none; 
  }

  .btn-fetch {
    background: var(--accent2); color: white; border: none; padding: 10px 24px;
    border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: none; }
  .card.visible { display: block; }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-family: 'IBM Plex Mono'; font-weight: 600; }

  /* TABLE */
  .tables-wrap { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tables-wrap.visible { display: block; }
  table { width: 100%; border-collapse: collapse; text-align: left; }
  th { background: var(--surface2); padding: 12px; font-size: 12px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); cursor: pointer; }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(0,0,0,0.02); }

  .progress-bar { height: 4px; background: var(--accent2); width: 0%; transition: width 0.3s; position: fixed; top: 0; left: 0; z-index: 1000; }
  
  .theme-toggle { cursor: pointer; padding: 8px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
  <div class="logo-mark">EN</div>
  <div>
    <div style="font-weight:600">PESRP Enrollment Engine</div>
    <div style="font-size:12px; color:var(--muted)">Live Markaz-wise Data</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  <div class="header-date" id="headerDate">--</div>
</header>

<main>
  <div class="filter-panel">
    <div class="filter-row">
      <div class="filter-group">
        <label>District</label>
        <select id="selDistrict"><option>Loading Districts...</option></select>
      </div>
      <div class="filter-group">
        <label>Tehsil</label>
        <select id="selTehsil" disabled><option>Select District First</option></select>
      </div>
      <div class="filter-group">
        <label>Markaz</label>
        <select id="selMarkaz" disabled><option>Select Tehsil First</option></select>
      </div>
      <div style="align-self: flex-end;">
        <button class="btn-fetch" id="btnFetch" disabled onclick="handleFetch()">Fetch Live Data</button>
      </div>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card" id="cardTotal">
      <div class="card-label">Total Enrollment</div>
      <div class="card-value" style="color:var(--accent2)" id="valTotal">0</div>
    </div>
    <div class="card" id="cardMale">
      <div class="card-label">Male</div>
      <div class="card-value" style="color:var(--accent)" id="valMale">0</div>
    </div>
    <div class="card" id="cardFemale">
      <div class="card-label">Female</div>
      <div class="card-value" style="color:var(--pink)" id="valFemale">0</div>
    </div>
  </div>

  <div class="tables-wrap" id="tablesWrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th>School Name</th>
          <th>EMIS</th>
          <th>Level</th>
          <th style="text-align:right">Male</th>
          <th style="text-align:right">Female</th>
          <th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <!-- New Class-wise Breakdown Table -->
<div id="classWiseSection" style="margin-top: 40px; display: none;">
    <h3 style="margin-bottom: 15px; color: var(--accent);">Class-wise Enrollment Breakdown</h3>
    <table id="classTable">
        <thead>
            <tr>
                <th>School Name</th>
                <th>Class</th>
                <th style="text-align:right">Male</th>
                <th style="text-align:right">Female</th>
                <th style="text-align:right">Total</th>
            </tr>
        </thead>
        <tbody id="classTbody"></tbody>
    </table>
</div>
    <div style="padding: 20px; text-align: right;">
        <button class="btn-fetch" style="background:var(--accent)" onclick="exportCSV()">Download CSV</button>
    </div>
  </div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFGaSeUAf7BVkqHbcQg91XXeZbrVi8rATTJ-jxmOC1taoFXYvFa5J-LL6-Q1KR-Pz5AMS7tG8Skn2h/pub?gid=2066596328&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynghF5JD8hchaG8FWdd12NqaXXMBA2ZZrR5a16CP-kGVPWkzcZtfPx4ywvqGxql3v-QQ/exec";

let allData = [];
let filteredResults = [];

// --- THEME ---
function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

// --- INITIALIZATION (FIXED AWAIT ERROR) ---
async function init() {
  try {
    const response = await fetch(CSV_URL);
    const text = await response.text();
    allData = parseCSV(text);
    
    populateDropdown('selDistrict', [...new Set(allData.map(r => r.District))]);
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString();
  } catch (e) {
    alert("Error loading master data. Please refresh.");
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(',');
    return headers.reduce((obj, header, i) => {
      obj[header] = values[i] ? values[i].trim() : '';
      return obj;
    }, {});
  });
}

// --- DROPDOWN LOGIC ---
function populateDropdown(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">Select ${id.replace('sel','')}</option>` + 
                 list.sort().map(item => `<option value="${item}">${item}</option>`).join('');
  el.disabled = false;
}

document.getElementById('selDistrict').addEventListener('change', (e) => {
  const tehsils = [...new Set(allData.filter(r => r.District === e.target.value).map(r => r.Tehsil))];
  populateDropdown('selTehsil', tehsils);
  document.getElementById('selMarkaz').disabled = true;
});

document.getElementById('selTehsil').addEventListener('change', (e) => {
  const markaz = [...new Set(allData.filter(r => r.Tehsil === e.target.value).map(r => r.Markaz))];
  populateDropdown('selMarkaz', markaz);
});

document.getElementById('selMarkaz').addEventListener('change', (e) => {
  document.getElementById('btnFetch').disabled = !e.target.value;
});

// --- FETCH FROM GAS ENGINE ---
async function handleFetch() {
  const markaz = document.getElementById('selMarkaz').value;
  const btn = document.getElementById('btnFetch');
  const pb = document.getElementById('progressBar');
  
  btn.disabled = true;
  btn.textContent = "Processing...";
  pb.style.width = "40%";

  try {
    const response = await fetch(`${SCRIPT_URL}?markaz=${encodeURIComponent(markaz)}`);
    const result = await response.json();

    if (result.status === "busy") {
      alert("Server is serving other users. Please try again in 10 seconds.");
    } else if (result.status === "success") {
      filteredResults = result.data;
      renderUI();
    } else {
      alert("Error: " + result.message);
    }
  } catch (e) {
    alert("Backend Connection Failed.");
  } finally {
    btn.disabled = false;
    btn.textContent = "Fetch Live Data";
    pb.style.width = "0%";
  }
}

function renderUI() {
  const tbody = document.getElementById('tbody');
  const classTbody = document.getElementById('classTbody');
  tbody.innerHTML = '';
  classTbody.innerHTML = '';
  
  let total = 0, male = 0, female = 0;

  filteredResults.forEach(r => {
    total += r.total; male += r.male; female += r.female;
    
    // Fill School Summary Table
    tbody.innerHTML += `
      <tr>
        <td><b>${r.name}</b></td>
        <td style="font-family:monospace">${r.emis}</td>
        <td>${r.level}</td>
        <td style="text-align:right">${r.male}</td>
        <td style="text-align:right">${r.female}</td>
        <td style="text-align:right; font-weight:600; color:var(--accent2)">${r.total}</td>
      </tr>`;

    // Fill Class-wise Detail Table
    r.details.forEach(c => {
      classTbody.innerHTML += `
        <tr>
          <td>${r.name}</td>
          <td>${c.className}</td>
          <td style="text-align:right">${c.m}</td>
          <td style="text-align:right">${c.f}</td>
          <td style="text-align:right">${c.t}</td>
        </tr>`;
    });
  });

  document.getElementById('valTotal').textContent = total.toLocaleString();
  document.getElementById('valMale').textContent = male.toLocaleString();
  document.getElementById('valFemale').textContent = female.toLocaleString();
  
  document.querySelectorAll('.card').forEach(c => c.classList.add('visible'));
  document.getElementById('tablesWrap').classList.add('visible');
  document.getElementById('classWiseSection').style.display = 'block';
}

function exportCSV() {
  const markaz = document.getElementById('selMarkaz').value;
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = `Enrollment_${markaz}_${timestamp}.csv`;

  // Headers updated for Class-wise detail
  let csv = "School Name,EMIS,Level,Class,Male,Female,Total\n";
  
  filteredResults.forEach(r => {
    r.details.forEach(c => {
      csv += `"${r.name}",${r.emis},${r.level},"${c.className}",${c.m},${c.f},${c.t}\n`;
    });
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', filename);
  a.click();
  window.URL.revokeObjectURL(url);
}

// Start the app
init();
</script>

</body>
</html>
