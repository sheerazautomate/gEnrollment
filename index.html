<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PESRP Markaz Enrollment Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root[data-theme="dark"] {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2330; --border: #30363d;
    --accent: #58a6ff; --accent2: #3fb950; --pink: #f472b6; --text: #e6edf3; --muted: #7d8590;
  }
  :root[data-theme="light"] {
    --bg: #f6f8fa; --surface: #ffffff; --surface2: #f3f4f6; --border: #d0d7de;
    --accent: #0969da; --accent2: #1a7f37; --pink: #d03592; --text: #1f2328; --muted: #656d76;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; transition: background 0.3s; font-size: 14px; line-height: 1.5; }
  
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px);
  }
  .logo-mark { width: 36px; height: 36px; background: var(--accent2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; }
  .header-date { margin-left: auto; font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--accent2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); }
  
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* FILTERS */
  .filter-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
  select { 
    background: var(--surface2); border: 1px solid var(--border); color: var(--text); 
    padding: 10px; border-radius: 6px; cursor: pointer; outline: none; appearance: none;
  }

  .btn-fetch {
    background: var(--accent2); color: white; border: none; padding: 10px 24px;
    border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; gap: 8px; justify-content: center;
  }
  .btn-fetch:disabled { opacity: 0.6; cursor: not-allowed; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    padding: 24px; display: none; position: relative; overflow: hidden;
  }
  .card.visible { display: block; }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent-color, var(--accent2)); }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-family: 'IBM Plex Mono'; font-weight: 600; }

  /* TABLE WRAPPER & SCROLL */
  .tables-container { display: none; }
  .tables-container.visible { display: block; }
  .table-wrapper { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    overflow-x: auto; margin-bottom: 32px; -webkit-overflow-scrolling: touch;
  }
  
  table { width: 100%; border-collapse: collapse; text-align: left; min-width: 600px; }
  th { 
    background: var(--surface2); padding: 14px; font-size: 11px; color: var(--muted); 
    text-transform: uppercase; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  
  /* Grouped School Header */
  .school-header-row { background: var(--surface2); }
  .school-header-row td { 
    font-weight: 600; color: var(--accent); font-size: 13px; 
    border-bottom: 2px solid var(--border); padding: 16px 14px;
    position: sticky; top: 40px; z-index: 9;
  }

  /* LOADING STATE */
  .skeleton { height: 20px; background: var(--surface2); border-radius: 4px; position: relative; overflow: hidden; }
  .skeleton::after {
    content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    transform: translateX(-100%);
    background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.05) 20%, rgba(255,255,255,0.1) 60%, rgba(255,255,255,0));
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  .progress-bar { height: 3px; background: var(--accent2); width: 0%; transition: width 0.4s ease; position: fixed; top: 0; left: 0; z-index: 1000; }
  .theme-toggle { cursor: pointer; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .card-value { font-size: 24px; }
    .table-wrapper::after { content: 'Scroll →'; position: absolute; right: 10px; bottom: 10px; font-size: 10px; color: var(--muted); pointer-events: none; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
  <div class="logo-mark">EN</div>
  <div>
    <div style="font-weight:600">PESRP Enrollment Engine</div>
    <div style="font-size:12px; color:var(--muted)">Live Markaz-wise Data</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  <div class="header-date" id="headerDate">--</div>
</header>

<main>
  <div class="filter-panel">
    <div class="filter-row">
      <div class="filter-group">
        <label>District</label>
        <select id="selDistrict"><option>Loading Districts...</option></select>
      </div>
      <div class="filter-group">
        <label>Tehsil</label>
        <select id="selTehsil" disabled><option>Select District First</option></select>
      </div>
      <div class="filter-group">
        <label>Markaz</label>
        <select id="selMarkaz" disabled><option>Select Tehsil First</option></select>
      </div>
      <div style="flex: 0;">
        <button class="btn-fetch" id="btnFetch" disabled onclick="handleFetch()">Fetch Live Data</button>
      </div>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card" id="cardTotal" style="--accent-color: var(--accent2)">
      <div class="card-label">Total Enrollment</div>
      <div class="card-value" style="color:var(--accent2)" id="valTotal">0</div>
    </div>
    <div class="card" id="cardMale" style="--accent-color: var(--accent)">
      <div class="card-label">Male</div>
      <div class="card-value" style="color:var(--accent)" id="valMale">0</div>
    </div>
    <div class="card" id="cardFemale" style="--accent-color: var(--pink)">
      <div class="card-label">Female</div>
      <div class="card-value" style="color:var(--pink)" id="valFemale">0</div>
    </div>
  </div>

  <div class="tables-container" id="tablesContainer">
    <h3 style="margin-bottom: 12px; font-weight: 500;">School Summary</h3>
    <div class="table-wrapper">
      <table id="mainTable">
        <thead>
          <tr>
            <th>School Name</th>
            <th>EMIS</th>
            <th>Level</th>
            <th style="text-align:right">Male</th>
            <th style="text-align:right">Female</th>
            <th style="text-align:right">Total</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <h3 style="margin: 32px 0 12px; font-weight: 500;">Class-wise Detailed Breakdown</h3>
    <div class="table-wrapper">
      <table id="classTable">
        <thead>
          <tr>
            <th>Class Level</th>
            <th style="text-align:right">Male</th>
            <th style="text-align:right">Female</th>
            <th style="text-align:right">Total</th>
          </tr>
        </thead>
        <tbody id="classTbody"></tbody>
      </table>
    </div>

    <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
        <button class="btn-fetch" style="background:var(--accent)" onclick="exportCSV()">Download CSV Report</button>
    </div>
  </div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFGaSeUAf7BVkqHbcQg91XXeZbrVi8rATTJ-jxmOC1taoFXYvFa5J-LL6-Q1KR-Pz5AMS7tG8Skn2h/pub?gid=2066596328&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynghF5JD8hchaG8FWdd12NqaXXMBA2ZZrR5a16CP-kGVPWkzcZtfPx4ywvqGxql3v-QQ/exec";

let allData = [];
let filteredResults = [];

function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

async function init() {
  try {
    const response = await fetch(CSV_URL);
    const text = await response.text();
    allData = parseCSV(text);
    populateDropdown('selDistrict', [...new Set(allData.map(r => r.District))]);
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-GB');
  } catch (e) { alert("Error loading master data."); }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(',');
    return headers.reduce((obj, header, i) => {
      obj[header] = values[i] ? values[i].trim() : '';
      return obj;
    }, {});
  });
}

function populateDropdown(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">Select ${id.replace('sel','')}</option>` + 
                 list.sort().map(item => `<option value="${item}">${item}</option>`).join('');
  el.disabled = false;
}

document.getElementById('selDistrict').addEventListener('change', (e) => {
  const tehsils = [...new Set(allData.filter(r => r.District === e.target.value).map(r => r.Tehsil))];
  populateDropdown('selTehsil', tehsils);
  document.getElementById('selMarkaz').disabled = true;
});

document.getElementById('selTehsil').addEventListener('change', (e) => {
  const markaz = [...new Set(allData.filter(r => r.Tehsil === e.target.value).map(r => r.Markaz))];
  populateDropdown('selMarkaz', markaz);
});

document.getElementById('selMarkaz').addEventListener('change', (e) => {
  document.getElementById('btnFetch').disabled = !e.target.value;
});

async function handleFetch() {
  const markaz = document.getElementById('selMarkaz').value;
  const btn = document.getElementById('btnFetch');
  const pb = document.getElementById('progressBar');
  
  btn.disabled = true;
  btn.innerHTML = `<span>Fetching...</span>`;
  pb.style.width = "85%"; // Smoother jump

  try {
    const response = await fetch(`${SCRIPT_URL}?markaz=${encodeURIComponent(markaz)}`);
    const result = await response.json();

    if (result.status === "success") {
      filteredResults = result.data;
      renderUI();
      pb.style.width = "100%";
      setTimeout(() => pb.style.width = "0%", 500);
    } else {
      alert(result.message || "Server Error");
    }
  } catch (e) {
    alert("Backend Connection Failed.");
  } finally {
    btn.disabled = false;
    btn.textContent = "Fetch Live Data";
  }
}

function renderUI() {
  const tbody = document.getElementById('tbody');
  const classTbody = document.getElementById('classTbody');
  tbody.innerHTML = '';
  classTbody.innerHTML = '';
  
  let total = 0, male = 0, female = 0;

  filteredResults.forEach(r => {
    total += r.total; male += r.male; female += r.female;
    
    // Main Summary Table
    tbody.innerHTML += `
      <tr>
        <td><div style="font-weight:600">${r.name}</div></td>
        <td style="font-family:monospace; font-size:12px">${r.emis}</td>
        <td><span style="font-size:10px; background:var(--surface2); padding:2px 6px; border-radius:4px">${r.level}</span></td>
        <td style="text-align:right">${r.male.toLocaleString()}</td>
        <td style="text-align:right">${r.female.toLocaleString()}</td>
        <td style="text-align:right; font-weight:600; color:var(--accent2)">${r.total.toLocaleString()}</td>
      </tr>`;

    // Grouped Class Detail Table
    classTbody.innerHTML += `
      <tr class="school-header-row">
        <td colspan="4">${r.name} <span style="opacity:0.6; font-weight:400; font-family:monospace; margin-left:8px;">(${r.emis})</span></td>
      </tr>`;

    r.details.forEach(c => {
      classTbody.innerHTML += `
        <tr>
          <td style="padding-left:30px; color:var(--muted)">${c.className}</td>
          <td style="text-align:right">${c.m}</td>
          <td style="text-align:right">${c.f}</td>
          <td style="text-align:right; font-weight:500">${c.t}</td>
        </tr>`;
    });
  });

  document.getElementById('valTotal').textContent = total.toLocaleString();
  document.getElementById('valMale').textContent = male.toLocaleString();
  document.getElementById('valFemale').textContent = female.toLocaleString();
  
  document.querySelectorAll('.card').forEach(c => c.classList.add('visible'));
  document.getElementById('tablesContainer').classList.add('visible');
}

function exportCSV() {
  const markaz = document.getElementById('selMarkaz').value;
  const timestamp = new Date().toISOString().slice(0, 10);
  let csv = "School Name,EMIS,Level,Class,Male,Female,Total\n";
  
  filteredResults.forEach(r => {
    r.details.forEach(c => {
      csv += `"${r.name}",${r.emis},${r.level},"${c.className}",${c.m},${c.f},${c.t}\n`;
    });
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Enrollment_${markaz}_${timestamp}.csv`;
  a.click();
}

init();
</script>

</body>
</html>
