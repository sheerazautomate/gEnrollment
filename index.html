<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PESRP • Markaz Enrollment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
  
  :root[data-theme="dark"] {
    --bg: #0a0f1c;
    --surface: #111827;
    --surface2: #1f2937;
    --border: #334155;
    --accent: #22d3ee;
    --accent2: #4ade80;
    --pink: #f472b6;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }
  
  :root[data-theme="light"] {
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --accent: #0891b2;
    --accent2: #16a34a;
    --pink: #db2777;
    --text: #0f172a;
    --muted: #64748b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system_ui, sans-serif;
  }
  
  .title-font { font-family: 'Space Grotesk', sans-serif; }

  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .stat-card {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .stat-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
  }

  table {
    border-collapse: collapse;
  }
  
  th, td {
    transition: background-color 0.2s;
  }
  
  tr:hover {
    background: var(--surface2) !important;
  }

  .mobile-table-card {
    transition: all 0.3s ease;
  }

  .btn-primary {
    background: linear-gradient(90deg, #22d3ee, #4ade80);
    transition: all 0.3s ease;
  }
  
  .btn-primary:active {
    transform: scale(0.95);
  }
</style>
</head>
<body class="min-h-screen pb-16">

<div id="progressBar" class="h-1 bg-gradient-to-r from-cyan-400 to-emerald-400 fixed top-0 left-0 z-50 transition-all duration-500" style="width:0%"></div>

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-[var(--surface)] border-b border-[var(--border)]">
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 via-emerald-400 to-teal-500 rounded-3xl flex items-center justify-center text-3xl shadow-xl shadow-cyan-500/30">
        📊
      </div>
      <div>
        <h1 class="title-font text-3xl font-bold tracking-tighter">PESRP</h1>
        <p class="text-sm text-[var(--muted)] -mt-1">Markaz Enrollment Engine</p>
      </div>
    </div>
    
    <div class="flex items-center gap-4">
      <div id="headerDate" class="text-sm font-medium px-5 py-2.5 rounded-3xl bg-[var(--surface2)] border border-[var(--border)]"></div>
      <button onclick="toggleTheme()" 
              class="w-11 h-11 flex items-center justify-center text-2xl hover:bg-[var(--surface2)] rounded-3xl border border-[var(--border)]">
        🌓
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 pt-8">

  <!-- FILTERS -->
  <div class="glass border border-[var(--border)] rounded-3xl p-8 mb-10">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
      <div>
        <label class="block text-xs font-semibold tracking-widest text-[var(--muted)] mb-2">DISTRICT</label>
        <select id="selDistrict" class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400 text-base"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold tracking-widest text-[var(--muted)] mb-2">TEHSIL</label>
        <select id="selTehsil" disabled class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400 text-base"></select>
      </div>
      <div>
        <label class="block text-xs font-semibold tracking-widest text-[var(--muted)] mb-2">MARKAZ</label>
        <select id="selMarkaz" disabled class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400 text-base"></select>
      </div>
      <div class="flex items-end">
        <button onclick="handleFetch()" id="btnFetch"
                class="btn-primary w-full text-white font-semibold py-4 px-8 rounded-3xl flex items-center justify-center gap-3 shadow-lg shadow-cyan-500/40 text-lg">
          <i class="fa-solid fa-bolt"></i>
          <span id="btnText">Fetch Live Data</span>
        </button>
      </div>
    </div>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12" id="cardsContainer"></div>

  <!-- SEARCH -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="title-font text-3xl font-bold tracking-tighter">School Overview</h2>
    <div class="relative w-full max-w-xs">
      <input id="searchInput" 
             onkeyup="filterSchools()"
             type="text" 
             placeholder="Search schools..." 
             class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded-3xl py-4 pl-12 pr-6 focus:outline-none focus:border-cyan-400">
      <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-[var(--muted)]"></i>
    </div>
  </div>

  <!-- MAIN TABLE (Desktop) + Mobile Cards -->
  <div id="tablesContainer" class="hidden">
    <!-- Desktop Table -->
    <div class="hidden md:block card border border-[var(--border)] rounded-3xl overflow-hidden bg-[var(--surface)]">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b border-[var(--border)] bg-[var(--surface2)]">
              <th class="text-left py-6 px-8 font-medium text-[var(--muted)]">School Name</th>
              <th class="text-left py-6 px-8 font-medium text-[var(--muted)]">EMIS</th>
              <th class="text-left py-6 px-8 font-medium text-[var(--muted)]">Level</th>
              <th class="text-right py-6 px-8 font-medium text-[var(--muted)]">Boys</th>
              <th class="text-right py-6 px-8 font-medium text-[var(--muted)]">Girls</th>
              <th class="text-right py-6 px-8 font-medium text-[var(--muted)]">Total</th>
            </tr>
          </thead>
          <tbody id="tbody" class="text-base"></tbody>
        </table>
      </div>
    </div>

    <!-- Mobile Cards -->
    <div id="mobileCards" class="md:hidden space-y-4"></div>

    <!-- Class-wise Breakdown -->
    <h2 class="title-font text-3xl font-bold tracking-tighter mt-16 mb-8">Class-wise Breakdown</h2>
    <div id="classDetails" class="space-y-8"></div>

    <!-- Export -->
    <div class="flex justify-center mt-12">
      <button onclick="exportCSV()" 
              class="flex items-center gap-3 bg-white dark:bg-zinc-900 hover:bg-emerald-50 dark:hover:bg-emerald-950 text-black dark:text-white font-semibold px-10 py-5 rounded-3xl shadow-lg">
        <i class="fa-solid fa-download"></i>
        Download Complete Report (CSV)
      </button>
    </div>
  </div>
</main>

<footer class="text-center text-[var(--muted)] text-sm py-10">
  PESRP Enrollment Dashboard • Live Data • <span id="lastUpdated"></span>
</footer>

<script>
// ================== CONFIG ==================
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFGaSeUAf7BVkqHbcQg91XXeZbrVi8rATTJ-jxmOC1taoFXYvFa5J-LL6-Q1KR-Pz5AMS7tG8Skn2h/pub?gid=2066596328&single=true&output=csv";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynghF5JD8hchaG8FWdd12NqaXXMBA2ZZrR5a16CP-kGVPWkzcZtfPx4ywvqGxql3v-QQ/exec";

let allData = [];
let filteredResults = [];

// ================== UTILS ==================
function toggleTheme() {
  const root = document.documentElement;
  root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML = `
    <i class="fa-solid fa-calendar-day mr-2"></i>
    ${now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
  `;
  document.getElementById('lastUpdated').textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}

// ================== DATA ==================
async function init() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    allData = parseCSV(text);
    populateDropdown('selDistrict', [...new Set(allData.map(r => r.District))]);
    updateHeaderDate();
  } catch (e) {
    alert("Failed to load data");
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    return headers.reduce((obj, header, i) => {
      obj[header] = values[i] ? values[i].replace(/^"|"$/g, '').trim() : '';
      return obj;
    }, {});
  });
}

function populateDropdown(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = `<option value="">Select ${id.replace('sel','')}</option>` + 
                 list.sort().map(item => `<option value="${item}">${item}</option>`).join('');
  el.disabled = false;
}

// Dropdown chaining
document.getElementById('selDistrict').addEventListener('change', (e) => {
  const tehsils = [...new Set(allData.filter(r => r.District === e.target.value).map(r => r.Tehsil))];
  populateDropdown('selTehsil', tehsils);
  document.getElementById('selMarkaz').innerHTML = '<option value="">Select Tehsil First</option>';
  document.getElementById('selMarkaz').disabled = true;
});

document.getElementById('selTehsil').addEventListener('change', (e) => {
  const markazs = [...new Set(allData.filter(r => r.Tehsil === e.target.value).map(r => r.Markaz))];
  populateDropdown('selMarkaz', markazs);
});

document.getElementById('selMarkaz').addEventListener('change', (e) => {
  document.getElementById('btnFetch').disabled = !e.target.value;
});

// ================== FETCH & RENDER ==================
async function handleFetch() {
  const markaz = document.getElementById('selMarkaz').value;
  if (!markaz) return;

  const btn = document.getElementById('btnFetch');
  const pb = document.getElementById('progressBar');
  const original = btn.innerHTML;

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Fetching...`;
  pb.style.width = "85%";

  try {
    const res = await fetch(`${SCRIPT_URL}?markaz=${encodeURIComponent(markaz)}`);
    const result = await res.json();

    if (result.status === "success") {
      filteredResults = result.data;
      pb.style.width = "100%";
      renderUI();
      setTimeout(() => pb.style.width = "0%", 600);
    } else {
      alert(result.message || "Error fetching data");
    }
  } catch (e) {
    alert("Connection failed");
  } finally {
    btn.disabled = false;
    btn.innerHTML = original;
  }
}

function renderCards() {
  let total = 0, male = 0, female = 0;
  filteredResults.forEach(s => {
    total += s.total || 0;
    male += s.male || 0;
    female += s.female || 0;
  });

  document.getElementById('cardsContainer').innerHTML = `
    <div class="stat-card bg-[var(--surface)] border border-[var(--border)] rounded-3xl p-8">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-emerald-400 text-sm font-semibold tracking-widest">TOTAL</p>
          <p class="text-5xl font-bold title-font mt-4">${total.toLocaleString()}</p>
        </div>
        <span class="text-6xl opacity-10">👥</span>
      </div>
    </div>
    <div class="stat-card bg-[var(--surface)] border border-[var(--border)] rounded-3xl p-8">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-cyan-400 text-sm font-semibold tracking-widest">BOYS</p>
          <p class="text-5xl font-bold title-font mt-4 text-cyan-300">${male.toLocaleString()}</p>
        </div>
        <span class="text-6xl opacity-10">👦</span>
      </div>
    </div>
    <div class="stat-card bg-[var(--surface)] border border-[var(--border)] rounded-3xl p-8">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-pink-400 text-sm font-semibold tracking-widest">GIRLS</p>
          <p class="text-5xl font-bold title-font mt-4 text-pink-300">${female.toLocaleString()}</p>
        </div>
        <span class="text-6xl opacity-10">👧</span>
      </div>
    </div>
  `;
}

function renderMainTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  filteredResults.forEach(school => {
    const tr = document.createElement('tr');
    tr.className = "border-b border-[var(--border)] last:border-none hover:bg-[var(--surface2)]";
    tr.innerHTML = `
      <td class="py-6 px-8 font-medium">${school.name}</td>
      <td class="py-6 px-8 font-mono text-sm text-[var(--muted)]">${school.emis}</td>
      <td class="py-6 px-8"><span class="px-4 py-1.5 text-xs rounded-3xl bg-[var(--surface2)]">${school.level}</span></td>
      <td class="py-6 px-8 text-right font-semibold text-cyan-300">${school.male.toLocaleString()}</td>
      <td class="py-6 px-8 text-right font-semibold text-pink-400">${school.female.toLocaleString()}</td>
      <td class="py-6 px-8 text-right font-bold text-emerald-400">${school.total.toLocaleString()}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderMobileCards() {
  const container = document.getElementById('mobileCards');
  container.innerHTML = '';

  filteredResults.forEach(school => {
    const div = document.createElement('div');
    div.className = "mobile-table-card bg-[var(--surface)] border border-[var(--border)] rounded-3xl p-6";
    div.innerHTML = `
      <div class="flex justify-between items-start">
        <div>
          <div class="font-semibold text-lg">${school.name}</div>
          <div class="text-xs font-mono text-[var(--muted)]">${school.emis} • ${school.level}</div>
        </div>
        <div class="text-right">
          <div class="text-3xl font-bold text-emerald-400">${school.total}</div>
          <div class="text-xs text-[var(--muted)]">students</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-6 mt-6">
        <div class="text-center bg-[var(--surface2)] rounded-2xl py-4">
          <div class="text-cyan-400 text-sm">Boys</div>
          <div class="text-2xl font-semibold">${school.male}</div>
        </div>
        <div class="text-center bg-[var(--surface2)] rounded-2xl py-4">
          <div class="text-pink-400 text-sm">Girls</div>
          <div class="text-2xl font-semibold">${school.female}</div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

function renderClassDetails() {
  const container = document.getElementById('classDetails');
  container.innerHTML = '';

  filteredResults.forEach(school => {
    let html = `
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-3xl p-7">
        <div class="flex items-center gap-3 mb-6">
          <div class="font-semibold text-xl">${school.name}</div>
          <div class="font-mono text-sm bg-[var(--surface2)] px-4 py-1 rounded-3xl">${school.emis}</div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">`;

    school.details.forEach(cls => {
      html += `
        <div class="bg-[var(--surface2)] rounded-2xl p-5">
          <div class="text-sm text-[var(--muted)]">${cls.className}</div>
          <div class="flex justify-between mt-4">
            <div class="text-cyan-300">${cls.m} <span class="text-xs">boys</span></div>
            <div class="text-pink-400">${cls.f} <span class="text-xs">girls</span></div>
            <div class="font-bold">${cls.t}</div>
          </div>
        </div>`;
    });

    html += `</div></div>`;
    container.innerHTML += html;
  });
}

function renderUI() {
  document.getElementById('tablesContainer').classList.remove('hidden');
  renderCards();
  renderMainTable();
  renderMobileCards();
  renderClassDetails();
}

function filterSchools() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  
  // Desktop table
  document.querySelectorAll('#tbody tr').forEach(row => {
    const name = row.cells[0].textContent.toLowerCase();
    row.style.display = name.includes(term) ? '' : 'none';
  });

  // Mobile cards
  document.querySelectorAll('#mobileCards > div').forEach(card => {
    const name = card.textContent.toLowerCase();
    card.style.display = name.includes(term) ? '' : 'none';
  });
}

function exportCSV() {
  const markaz = document.getElementById('selMarkaz').value || "Markaz";
  let csv = "School Name,EMIS,Level,Class,Male,Female,Total\n";
  
  filteredResults.forEach(r => {
    r.details.forEach(c => {
      csv += `"${r.name.replace(/"/g,'""')}",${r.emis},"${r.level}","${c.className}",${c.m},${c.f},${c.t}\n`;
    });
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `PESRP_${markaz}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// Initialize
init();
</script>
</body>
</html>
